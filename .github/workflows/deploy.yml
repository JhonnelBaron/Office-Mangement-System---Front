- name: Deploy via Native Rsync
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          
          # Gamitin natin ang 'printf' para hindi masira ang format ng key
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          
          # Siguraduhin na may newline sa dulo ng file (importante ito sa SSH keys)
          echo "" >> ~/.ssh/id_ed25519
          
          chmod 600 ~/.ssh/id_ed25519
          
          # I-scan ang host (Port 65002)
          ssh-keyscan -p ${{ secrets.FTP_PORT }} ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts
          
          # I-run ang rsync na may verbose debug (-vv) para makita natin kung bakit nare-reject
          rsync -avzvv --delete -e "ssh -p ${{ secrets.FTP_PORT }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" .output/ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/u782169281/domains/pink-dotterel-993276.hostingersite.com/projects/Office-Mangement-System---Front/.output/
