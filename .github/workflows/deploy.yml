name: Auto Deploy Nuxt (SFTP)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-passphrase: ${{ secrets.SSH_PASSPHRASE }} # Awtomatikong i-uunlock nito ang key

      - name: Deploy via Native Rsync
        run: |
          # 1. I-scan ang fingerprint (para hindi magtanong ng yes/no)
          mkdir -p ~/.ssh
          ssh-keyscan -p 65002 77.37.78.239 >> ~/.ssh/known_hosts

          # 2. I-run ang Rsync (Wala na yung -i deploy_key dahil handle na ng ssh-agent)
          # PAALALA: Check mo yung 'Mangement' vs 'Management' sa baba!
          rsync -avz -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
          .output/ \
          u782169281@77.37.78.239:/home/u782169281/domains/pink-dotterel-993276.hostingersite.com/projects/Office-Management-System---Front/.output/
