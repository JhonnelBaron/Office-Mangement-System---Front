name: Auto Deploy Nuxt (SFTP)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}

      # 1. Idinagdag ang generate para malikha ang mga static sub-folders (gaya ng /unauthorized)
      - name: Generate Static Pages (SPA)
        run: pnpm run generate
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}

      # 2. In-update ang Rsync para kunin ang 'dist/' folder at may '--delete' para linisin ang mga luma sa server
      - name: Deploy via Native Rsync
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Setup SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 2. Isulat ang key gamit ang printf
          printf "%s\n" "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # 3. I-scan ang fingerprint
          ssh-keyscan -p 65002 77.37.78.239 >> ~/.ssh/known_hosts

          # 4. I-run ang Rsync mula sa dist/ papunta sa public_html ng Hostinger mo
          rsync -avz --delete -e "ssh -p 65002 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          dist/ \
          u782169281@77.37.78.239:/home/u782169281/domains/pink-dotterel-993276.hostingersite.com/public_html/
