- name: Deploy via Native Rsync
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Setup SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 2. Isulat ang key gamit ang printf para hindi masira ang format (newlines)
          printf "%s\n" "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # 3. I-scan ang fingerprint
          ssh-keyscan -p 65002 77.37.78.239 >> ~/.ssh/known_hosts

          # 4. I-run ang Rsync
          # Tinanggal muna natin ang --delete para i-test kung makaka-sulat tayo
          rsync -avz -e "ssh -p 65002 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          .output/ \
          u782169281@77.37.78.239:/home/u782169281/domains/pink-dotterel-993276.hostingersite.com/projects/Office-Mangement-System---Front/.output/
