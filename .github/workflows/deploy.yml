name: Auto Deploy Nuxt (SFTP)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build

      - name: Deploy via Rsync
        env:
          # Siguraduhin na ang SSH_PRIVATE_KEY secret ay tama ang format
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. I-setup ang SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 2. Isulat ang key sa file nang maayos
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # 3. I-scan ang Hostinger fingerprint para iwas "Identification Changed" error
          ssh-keyscan -p 65002 77.37.78.239 >> ~/.ssh/known_hosts

          # 4. I-run ang Rsync gamit ang specific key file
          # Nagdagdag tayo ng '-v' (verbose) para makita natin ang exact error kung sakali
          rsync -avz --delete \
            -e "ssh -p 65002 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .output/ \
            u782169281@77.37.78.239:/home/u782169281/domains/pink-dotterel-993276.hostingersite.com/projects/Office-Mangement-System---Front/.output/
